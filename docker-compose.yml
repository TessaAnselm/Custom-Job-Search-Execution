version: "3.8"

services:
  temporal:
    image: temporalio/admin-tools:latest
    command:
      - temporal
      - server
      - start-dev
      - --ip
      - "0.0.0.0"
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
