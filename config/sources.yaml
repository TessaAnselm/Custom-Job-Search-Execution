sources:
  # All search queries, keywords, and tags are derived from your profile at
  # runtime — nothing is hardcoded here. Only toggle sources on/off and set
  # scraper-specific options (remote: true, company slugs, etc.).

  # Greenhouse / Lever require specific company slugs to query their boards.
  # Add slugs only when you want to target a specific employer.
  - type: greenhouse
    enabled: false
    companies: []

  - type: lever
    enabled: false
    companies: []

  # HN Who's Hiring — monthly Ask HN thread, no config needed.
  - type: hn_hiring
    enabled: true

  # Remotive — free remote job board, no auth needed.
  - type: remotive
    enabled: true

  # RemoteOK — free remote job board, no auth needed.
  - type: remoteok
    enabled: true

  # LinkedIn — requires LINKEDIN_LI_AT session cookie in .env
  - type: linkedin
    enabled: false

  # Indeed RSS is dead (404). Disabled.
  - type: indeed
    enabled: false

  # YC Work at a Startup — JSON API removed (406). Disabled.
  - type: yc
    enabled: false
    remote: true

  # Wellfound — requires: playwright install chromium
  - type: wellfound
    enabled: true

  # Built In SF API is gone (405). Disabled.
  - type: builtin_sf
    enabled: false
    remote: true
