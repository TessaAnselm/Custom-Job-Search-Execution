sources:
  - type: greenhouse
    enabled: true
    companies:
      - stripe
      - airbnb
      - notion
      - figma
      - cloudflare
      - hashicorp
      - datadog

  - type: lever
    enabled: true
    companies:
      - anthropic
      - openai
      - mistral
      - scale
      - snyk
      - lacework

  - type: hn_hiring
    enabled: true

  - type: linkedin
    enabled: false   # requires LINKEDIN_LI_AT session cookie
    keywords:
      - "security engineer remote"
      - "appsec engineer remote"
      - "penetration tester remote"
      - "devsecops remote"
    location: "Remote"

  - type: indeed
    enabled: true
    location: "San Francisco, CA"
    queries:
      - "security engineer"
      - "appsec engineer"
      - "penetration tester"
      - "devsecops engineer"

  - type: wellfound
    enabled: true    # requires playwright — run: playwright install chromium
    queries:
      - "security engineer"
      - "appsec"
      - "devsecops"

  - type: yc
    enabled: true
    remote: true
    queries:
      - "security engineer"
      - "security analyst"
      - "appsec"

  - type: builtin_sf
    enabled: true
    remote: false    # set true to include remote roles
    keywords:
      - "security engineer"
      - "appsec engineer"
      - "penetration tester"
